<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <meta name="description" content="{{ config.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overlock:wght@400;700;900&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ get_url(path="base.css") }}">
    <link rel="icon" href="{{ get_url(path="favicon.ico") }}">
    {% block extra_head %}{% endblock extra_head %}
</head>
<body>
    {% block header %}
    <header>
        <nav class="site-nav site-nav--desktop">
            <a href="/" class="site-name">scoutaloud</a>
            <ul class="site-nav__list">
                <li {% if current_path is starting_with("/home-and-away") %}class="site-nav__item--active"{% endif %}><a href="/home-and-away/">Home &amp; Away</a></li>
                <li {% if current_path is starting_with("/projects") %}class="site-nav__item--active"{% endif %}><a href="/projects/">Projects</a></li>
                <li {% if current_path is starting_with("/blog") %}class="site-nav__item--active"{% endif %}><a href="/blog/">Blog</a></li>
            </ul>
        </nav>
        <nav class="site-nav site-nav--mobile">
            <a href="/" class="site-name">scoutaloud</a>
            <details>
                <summary>menu</summary>
                <ul class="site-nav__list">
                    <li {% if current_path is starting_with("/home-and-away") %}class="site-nav__item--active"{% endif %}><a href="/home-and-away/">Home &amp; Away</a></li>
                    <li {% if current_path is starting_with("/projects") %}class="site-nav__item--active"{% endif %}><a href="/projects/">Projects</a></li>
                    <li {% if current_path is starting_with("/blog") %}class="site-nav__item--active"{% endif %}><a href="/blog/">Blog</a></li>
                </ul>
            </details>
        </nav>
    </header>
    {% endblock header %}
    <main>
        {% block content %}{% endblock content %}
    </main>
</body>
</html>
